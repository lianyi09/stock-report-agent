name: 美股每日行情日报
on:
  # ============================================
  # 时区说明：
  #   GitHub Actions cron 只支持 UTC 时间
  #   北京时间 (UTC+8) 06:15 = UTC 22:15（前一天）
  #   避开整点高峰，提高免费账户调度稳定性
  # ============================================
  schedule:
    - cron: '*/5 * * * *'   # 临时测试：每5分钟触发一次（验证后改回正常）
  # 允许手动触发（用于首次测试）
  workflow_dispatch:

jobs:
  daily-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily report
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM_EMAIL: ${{ secrets.RESEND_FROM_EMAIL }}
          RESEND_FROM_NAME: ${{ secrets.RESEND_FROM_NAME }}
          RESEND_RECIPIENT: ${{ secrets.RESEND_RECIPIENT }}
          TZ: Asia/Shanghai   # 让 Python 输出北京时间
        run: python main.py

      - name: Upload report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-report
          path: report_*.html
          retention-days: 7
